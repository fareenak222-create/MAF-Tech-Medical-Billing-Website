<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - MAF TECH</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- NAVBAR (same as yours) -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">

            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="images/logo (2).png" class="brand-logo">
                <div class="brand-text">
                    <h4 class="brand-title">MAF TECH</h4>
                    <span class="brand-subtitle">Medical Billing Solutions</span>
                </div>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbar">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>

                </ul>
            </div>

        </div>
    </nav>

    <!-- HERO -->
    <section class="contact-hero text-center">
        <div class="container">
            <h1>Contact Us</h1>
            <p>We’re here to help your healthcare business grow</p>
        </div>
    </section>

    <!-- CONTACT SECTION -->
    <section class="py-5">
        <div class="container">

            <div class="row g-4">

                <!-- CONTACT INFO -->
                <div class="col-lg-4">
                    <div class="contact-card">
                        <i class="fa-solid fa-envelope"></i>
                        <h5>Email</h5>
                        <p>maft6411@gmail.com</p>
                    </div>

                    <div class="contact-card">
                        <i class="fa-solid fa-phone"></i>
                        <h5>Phone</h5>
                        <p>+92 (303) 2209-557</p>
                    </div>

                    <div class="contact-card">
                        <i class="fa-solid fa-location-dot"></i>
                        <h5>Location</h5>
                        <p>Remote / Global Services</p>
                    </div>
                </div>

                <!-- FORM -->

                <form id="contact-form" class="contact-form">

    <div class="row g-3">

        <div class="col-md-6">
            <input type="text" name="name" class="form-control" placeholder="Your Name" required>
        </div>

        <div class="col-md-6">
            <input type="email" name="email" class="form-control" placeholder="Your Email" required>
        </div>

        <div class="col-12">
            <input type="text" name="subject" class="form-control" placeholder="Subject" required>
        </div>

        <div class="col-12">
            <textarea name="message" class="form-control" rows="5" placeholder="Your Message" required></textarea>
        </div>

        <div class="col-12">
            <button type="submit" id="submitBtn" class="btn btn-primary w-100">
                <span id="btnText">Send Message</span>
                <span id="btnLoader" class="spinner-border spinner-border-sm d-none"></span>
            </button>
        </div>

        <div class="col-12">
            <div id="formMsg" class="text-center mt-3"></div>
        </div>

    </div>

</form>

                <!-- FOOTER -->
                <footer class="footer text-center">
                    <div class="container">
                        <p>© 2026 MAF TECH. All Rights Reserved.</p>
                    </div>
                </footer>

                <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</body>

</html>
